name: Windows Wheel

on:
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  build-wheel:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build pybind11 scikit-build-core wheel ninja

      - name: Check CUDA
        run: |
          nvcc --version
          where nvcc

      - name: Build wheel
        run: |
          python -m build --wheel --config-setting=cmake.args="-G Ninja"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: minipypy-windows-cp311-wheel
          path: dist/*.whl
